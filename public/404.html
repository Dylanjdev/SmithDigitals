<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting... | Smith Digitals</title>
    <script>
      (function () {
        var path = window.location.pathname || '/';
        var search = window.location.search || '';
        var redirect = '/index.html?redirect=' + encodeURIComponent(path + search);
        window.location.replace(redirect);
      })();
    </script>
  </head>
  <body></body>
</html>
